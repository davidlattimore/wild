# Same source as `rust-hello-world` but built with `profile.release.debug = true`
# (full debuginfo rather than line-tables-only). Exists specifically to make
# wild's `-O1` passes (debug_line v5 upgrade, debug_abbrev dedup, compress)
# visible on a bench small enough to rebuild in seconds. On line-tables-only
# binaries there's nothing for those passes to shrink.

[bench.rustc]
